    const PRESET_KEYS = new Set(PRESETS.map((p) => p.key));

    async function loadMcp() {
      const servers = await (await api('/api/mcp')).json();
      const box = $('integrations'); box.innerHTML = '';
      for (const p of PRESETS) box.appendChild(renderIntegrationCard(p, servers.find((s) => s.name === p.key)));

      // Any non-preset custom servers, shown read-only with a Remove button.
      const others = servers.filter((s) => !PRESET_KEYS.has(s.name));
      const list = $('mcp-list'); list.innerHTML = '';
      for (const s of others) {
        list.appendChild(connRow({
          name: s.name, sub: s.detail ? (s.url + ' · ' + s.detail) : (s.url || s.kind),
          badge: mcpBadge(s.status),
          actions: [{ label: 'Remove', onClick: () => mcpDelete(s.name) }],
        }));
      }
    }

    function mcpBadge(status) {
      if (status === 'connected') return { text: 'connected', cls: 'on' };
      if (status === 'failed') return { text: 'error', cls: 'off' };
      return { text: 'not connected', cls: 'off' };
    }

    function renderIntegrationCard(preset, srv) {
      const connected = srv && srv.status === 'connected';
      const failed = srv && srv.status === 'failed';
      const card = document.createElement('div'); card.className = 'gh-card';

      const head = document.createElement('div'); head.className = 'gh-head';
      head.innerHTML = preset.logo;
      const t = document.createElement('div'); t.style.flex = '1';
      const title = document.createElement('div'); title.className = 'gh-title'; title.textContent = preset.name;
      const sub = document.createElement('div'); sub.className = 'gh-sub';
      sub.textContent = connected ? (srv.detail || 'connected') : failed ? 'connection failed' : 'not connected';
      t.append(title, sub); head.appendChild(t);
      const badge = document.createElement('span'); const b = mcpBadge(srv ? srv.status : 'none');
      badge.className = 'badge ' + b.cls; badge.textContent = b.text; head.appendChild(badge);
      card.appendChild(head);

      const body = document.createElement('div'); body.className = 'gh-body';
      if (connected) {
        const btn = document.createElement('button'); btn.className = 'btn btn-sm btn-ghost'; btn.textContent = 'Disconnect';
        btn.onclick = () => integrationDisconnect(preset);
        body.appendChild(btn);
      } else if (preset.type === 'stdio') {
        renderStdioForm(preset, body);
        if (failed) { const f = document.createElement('div'); f.className = 'gh-fail'; f.textContent = String(srv.detail || '').slice(0, 240); body.appendChild(f); }
        const note = document.createElement('div'); note.className = 'gh-note'; note.innerHTML = preset.note;
        body.appendChild(note);
      } else {
        const row = document.createElement('div'); row.className = 'gh-connect';
        const input = document.createElement('input'); input.type = 'password'; input.placeholder = preset.tokenPh;
        const btn = document.createElement('button'); btn.className = 'btn btn-sm btn-primary'; btn.textContent = 'Connect';
        const go = () => integrationConnectHttp(preset, preset.url, input.value.trim(), btn);
        btn.onclick = go;
        input.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.isComposing) go(); });
        row.append(input, btn); body.appendChild(row);
        if (failed) { const f = document.createElement('div'); f.className = 'gh-fail'; f.textContent = String(srv.detail || '').slice(0, 240); body.appendChild(f); }
        const note = document.createElement('div'); note.className = 'gh-note'; note.innerHTML = preset.note;
        body.appendChild(note);
      }
      card.appendChild(body);
      return card;
    }

    // Local (stdio) bridges — Jira, Sentry, … — configured from preset.fields.
    function renderStdioForm(preset, body) {
      const form = document.createElement('div'); form.className = 'gh-form';
      const inputs = {};
      for (const f of preset.fields) {
        const el = document.createElement('input');
        if (f.password) el.type = 'password';
        el.placeholder = f.placeholder || f.id;
        inputs[f.id] = el; form.appendChild(el);
      }
      const btn = document.createElement('button'); btn.className = 'btn btn-sm btn-primary'; btn.textContent = 'Connect'; btn.style.alignSelf = 'flex-start';
      form.appendChild(btn); body.appendChild(form);
      const go = () => {
        const v = {}; for (const f of preset.fields) v[f.id] = inputs[f.id].value.trim();
        connectStdio(preset, v, btn);
      };
      btn.onclick = go;
      for (const f of preset.fields) inputs[f.id].addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.isComposing) go(); });
    }

    async function connectStdio(preset, v, btn) {
      const missing = preset.fields.some((f) => f.required && !v[f.id]);
      if (missing) { await confirmModal({ title: 'Missing fields', body: 'Please fill in all required fields.', confirmText: 'OK', hideCancel: true, danger: false }); return; }
      if (btn) { btn.disabled = true; btn.textContent = 'Connecting…'; }
      const cfg = preset.build(v);
      const res = await api('/api/mcp', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(Object.assign({ name: preset.key }, cfg)) });
      await finishConnect(preset, res, btn);
    }

    async function integrationConnectHttp(preset, url, token, btn) {
      if (!token) { await confirmModal({ title: 'Token required', body: 'Paste a token to connect ' + preset.name + '.', confirmText: 'OK', hideCancel: true, danger: false }); return; }
      if (btn) { btn.disabled = true; btn.textContent = 'Connecting…'; }
      const res = await api('/api/mcp', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: preset.key, url, token }) });
      await finishConnect(preset, res, btn);
    }

    async function finishConnect(preset, res, btn) {
      if (!res.ok) { await confirmModal({ title: 'Failed', body: 'Could not save the connection.', confirmText: 'OK', hideCancel: true, danger: false }); if (btn) { btn.disabled = false; btn.textContent = 'Connect'; } return; }
      await loadMcp();
      const check = await (await api('/api/mcp')).json();
      const srv = check.find((s) => s.name === preset.key);
      if (srv && srv.status === 'connected') await confirmModal({ title: preset.name + ' connected', body: 'Forge can now use ' + preset.name + ' tools (' + (srv.detail || 'ready') + ').', confirmText: 'Done', hideCancel: true, danger: false });
      else await confirmModal({ title: 'Saved, but not connected', body: preset.name + ' did not connect: ' + String(srv && srv.detail || 'unknown error').slice(0, 260) + '\n\nCheck the values and that the runtime (uvx/docker) is installed.', confirmText: 'OK', hideCancel: true, danger: false });
    }
    async function integrationDisconnect(preset) {
      const ok = await confirmModal({ title: 'Disconnect ' + preset.name, body: 'Remove the stored ' + preset.name + ' token and connection?', confirmText: 'Disconnect' });
      if (!ok) return;
      await api('/api/mcp/' + encodeURIComponent(preset.key), { method: 'DELETE' });
      loadMcp();
    }

    $('mcp-add').onclick = async () => {
      const name = $('mcp-name').value.trim(), url = $('mcp-url').value.trim(), token = $('mcp-token').value.trim();
      if (!name || !url) { await confirmModal({ title: 'Missing fields', body: 'Both a name and a URL are required.', confirmText: 'OK', hideCancel: true, danger: false }); return; }
      const body = { name, url }; if (token) body.token = token;
      const res = await api('/api/mcp', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      if (!res.ok) { await confirmModal({ title: 'Failed', body: 'Could not add server.', confirmText: 'OK', hideCancel: true, danger: false }); return; }
      $('mcp-name').value = ''; $('mcp-url').value = ''; $('mcp-token').value = ''; loadMcp();
    };
    async function mcpDelete(name) {
      const ok = await confirmModal({ title: 'Remove MCP server', body: 'Remove “' + name + '” from the config?', confirmText: 'Remove' });
      if (!ok) return;
      await api('/api/mcp/' + encodeURIComponent(name), { method: 'DELETE' });
      loadMcp();
    }

    /* ----- Providers ----- */
    async function loadProviders() {
      const list = $('prov-list'); list.innerHTML = '<div class="conn-empty">Loading…</div>';
      const res = await api('/api/providers'); const provs = await res.json();
      list.innerHTML = '';
      // Configured first, then the rest alphabetically (backend already sorts).
      provs.sort((a, b) => (b.configured - a.configured));
      const signedIn = provs.filter((p) => p.configured).length;
      $('prov-summary').textContent = 'AI providers' + (signedIn ? ' · ' + signedIn + ' signed in' : '');
      for (const p of provs) {
        const actions = [];
        if (p.configured) {
          actions.push({ label: 'Sign out', onClick: () => providerLogout(p.id) });
        } else {
          if (p.methods.includes('device')) actions.push({ label: 'Sign in', cls: 'btn-primary', onClick: () => providerDevice(p.id) });
          if (p.methods.includes('api_key')) actions.push({ label: 'API key', cls: p.methods.includes('device') ? 'btn-ghost' : 'btn-primary', onClick: () => providerApiKey(p.id) });
          if (!p.methods.some((m) => m === 'device' || m === 'api_key')) actions.push({ label: 'CLI only', cls: 'btn-ghost', onClick: () => confirmModal({ title: p.id, body: 'This provider uses “' + p.methods.join(', ') + '”. Sign in with: forge provider login', confirmText: 'OK', hideCancel: true, danger: false }) });
        }
        $('prov-list').appendChild(connRow({
          name: p.id, sub: p.methods.join(' · '),
          badge: { text: p.configured ? 'signed in' : 'not signed in', cls: p.configured ? 'on' : 'off' },
          actions,
        }));
      }
    }
    async function providerApiKey(id) {
      const key = await confirmModal({ title: 'Sign in to ' + id, body: 'Paste your API key.', confirmText: 'Save', input: { placeholder: 'sk-…', type: 'password' } });
      if (!key) return;
      const res = await api('/api/providers/apikey', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id, api_key: key }) });
      if (!res.ok) { const e = await res.json().catch(() => ({})); await confirmModal({ title: 'Failed', body: e.error ? String(e.error).slice(0, 300) : 'Could not save key.', confirmText: 'OK', hideCancel: true, danger: false }); }
      loadProviders(); loadModels();
    }
    async function providerDevice(id) {
      const res = await api('/api/providers/device', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) });
      if (!res.ok) { await confirmModal({ title: 'Failed', body: 'Could not start device sign-in.', confirmText: 'OK', hideCancel: true, danger: false }); return; }
      const reader = res.body.getReader(); const dec = new TextDecoder(); let buf = '';
      let dialog = null;
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const frames = buf.split('\n\n'); buf = frames.pop();
        for (const f of frames) {
          const line = f.split('\n').find((l) => l.startsWith('data:'));
          if (!line) continue;
          const ev = JSON.parse(line.slice(5).trim());
          if (ev.type === 'code') {
            if (ev.verification_uri_complete || ev.verification_uri) window.open(ev.verification_uri_complete || ev.verification_uri, '_blank');
            dialog = confirmModal({ title: 'Enter this code', body: 'Open ' + ev.verification_uri + ' and enter code:  ' + ev.user_code + '\n\nWaiting for you to authorize…', confirmText: 'Working…', hideCancel: true, danger: false });
          } else if (ev.type === 'done') {
            $('modal-overlay').classList.remove('open');
            await confirmModal({ title: 'Connected', body: 'Sign-in succeeded.', confirmText: 'OK', hideCancel: true, danger: false });
          } else if (ev.type === 'error') {
            $('modal-overlay').classList.remove('open');
            await confirmModal({ title: 'Sign-in failed', body: String(ev.message || '').slice(0, 300), confirmText: 'OK', hideCancel: true, danger: false });
          }
        }
      }
      loadProviders(); loadModels();
    }
    async function providerLogout(id) {
      const ok = await confirmModal({ title: 'Sign out of ' + id, body: 'Remove stored credentials for this provider?', confirmText: 'Sign out' });
      if (!ok) return;
      await api('/api/providers/' + encodeURIComponent(id), { method: 'DELETE' });
      loadProviders(); loadModels();
    }

    /* ---------- parallel tasks (squad) ---------- */
    $('squad-open').onclick = openSquad;
    $('squad-close').onclick = () => $('squad-overlay').classList.remove('open');
    $('squad-new').onclick = () => { $('squad-board').classList.remove('live'); $('squad-board').innerHTML = ''; resetSquadLauncher(); };
    $('squad-add').onclick = () => addSquadTaskCard();

    function openSquad() {
      $('squad-overlay').classList.add('open');
      if (!$('squad-board').classList.contains('live')) {
        if (!$('squad-tasks').children.length) resetSquadLauncher();
        else loadLeftoverWorktrees();
      }
    }
    function resetSquadLauncher() {
      $('squad-launcher').style.display = '';
      $('squad-tasks').innerHTML = '';
      addSquadTaskCard(); addSquadTaskCard();
      loadLeftoverWorktrees();
    }
    async function loadLeftoverWorktrees() {
      const box = $('squad-leftovers'); box.innerHTML = '';
      let list = [];
      try { list = (await (await api('/api/worktrees')).json()).worktrees || []; } catch (e) { return; }
      if (!list.length) return;
      const h = document.createElement('div'); h.className = 'leftover-h'; h.textContent = 'Leftover worktrees (' + list.length + ')';
      box.appendChild(h);
      const mk = (label, fn) => { const b = document.createElement('button'); b.className = 'btn btn-sm btn-ghost'; b.textContent = label; b.onclick = fn; return b; };
      for (const w of list) {
        const row = document.createElement('div'); row.className = 'leftover';
        const info = document.createElement('div'); info.className = 'info';
        const br = document.createElement('div'); br.className = 'br'; br.textContent = w.branch;
        const pth = document.createElement('div'); pth.className = 'pth'; pth.textContent = w.path; pth.title = w.path;
        info.append(br, pth);
        row.append(info,
          mk('View diff', async () => {
            const d = await (await api('/api/worktrees/diff', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ path: w.path }) })).json();
            await showHtmlModal(w.branch + ' — diff', (d.stat ? '<div class="conn-empty">' + escapeHtml(d.stat) + '</div>' : '') + (d.diff ? '<div class="diff-pre">' + renderDiff(d.diff) + '</div>' : '<div class="conn-empty">No changes.</div>'));
          }),
          mk('Apply', async () => {
            const ok = await confirmModal({ title: 'Apply to current branch', body: 'Squash ' + w.branch + ' onto your current branch (staged, not committed)?', confirmText: 'Apply', danger: false });
            if (!ok) return;
            const res = await api('/api/worktrees/apply', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ path: w.path }) });
            const d = await res.json().catch(() => ({}));
            await confirmModal({ title: res.ok ? 'Applied' : 'Apply failed', body: d.message || d.error || (res.ok ? 'Done.' : 'Failed.'), confirmText: 'OK', hideCancel: true, danger: false });
          }),
          mk('Remove', async () => {
            const ok = await confirmModal({ title: 'Remove worktree', body: 'Remove ' + w.branch + ' and its worktree?', confirmText: 'Remove' });
            if (!ok) return;
            await api('/api/worktrees/remove', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ path: w.path }) });
            loadLeftoverWorktrees();
          }),
        );
        box.appendChild(row);
      }
    }
    function addSquadTaskCard(name, prompt) {
      const row = document.createElement('div'); row.className = 'squad-task';
      const nm = document.createElement('input'); nm.placeholder = 'task name'; nm.value = name || '';
      const pr = document.createElement('textarea'); pr.placeholder = 'what should this agent do?'; pr.value = prompt || '';
      const del = document.createElement('button'); del.className = 'del'; del.textContent = '×'; del.title = 'Remove';
      del.onclick = () => row.remove();
      row.append(nm, pr, del);
      $('squad-tasks').appendChild(row);
    }

    let squadMode = 'diff';
    $('mode-diff').onclick = () => setSquadMode('diff');
    $('mode-best').onclick = () => setSquadMode('best');
    function setSquadMode(m) {
      squadMode = m;
      $('mode-diff').classList.toggle('sel', m === 'diff');
      $('mode-best').classList.toggle('sel', m === 'best');
      $('squad-diff-form').style.display = m === 'diff' ? '' : 'none';
      $('squad-bestof-form').style.display = m === 'best' ? '' : 'none';
    }

    $('squad-run').onclick = async () => {
      let tasks = [];
      if (squadMode === 'best') {
        const prompt = $('bestof-prompt').value.trim();
        const n = Math.max(2, Math.min(6, parseInt($('bestof-n').value) || 3));
        if (prompt) for (let i = 1; i <= n; i++) tasks.push({ name: 'attempt ' + i, prompt });
      } else {
        for (const row of $('squad-tasks').children) {
          const name = row.querySelector('input').value.trim();
          const prompt = row.querySelector('textarea').value.trim();
          if (prompt) tasks.push({ name: name || ('task ' + (tasks.length + 1)), prompt });
        }
      }
      if (!tasks.length) { await confirmModal({ title: 'No tasks', body: squadMode === 'best' ? 'Enter the task to attempt.' : 'Add at least one task with a prompt.', confirmText: 'OK', hideCancel: true, danger: false }); return; }
      const concurrency = Math.max(1, Math.min(5, parseInt($('squad-conc').value) || 3));
      const base_ref = $('squad-base').value.trim() || undefined;
      const res = await api('/api/squad', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tasks, concurrency, base_ref }) });
      if (!res.ok) { const e = await res.json().catch(() => ({})); await confirmModal({ title: 'Failed to start', body: e.error ? String(e.error).slice(0, 300) : 'Could not start the run.', confirmText: 'OK', hideCancel: true, danger: false }); return; }
      startSquadBoard(await res.json());
    };

    function startSquadBoard(run) {
      $('squad-launcher').style.display = 'none';
      const board = $('squad-board'); board.innerHTML = ''; board.classList.add('live');
      const cols = {};
      for (const t of run.tasks) {
        const col = document.createElement('div'); col.className = 'squad-col';
        const head = document.createElement('div'); head.className = 'squad-col-head';
        const nm = document.createElement('span'); nm.className = 'nm'; nm.textContent = t.name; nm.title = t.branch;
        const badge = document.createElement('span'); badge.className = 'badge running'; badge.textContent = 'running';
        const stopBtn = document.createElement('button'); stopBtn.className = 'btn btn-sm btn-ghost'; stopBtn.textContent = 'Stop';
        stopBtn.onclick = () => squadStop(run.run_id, t.id);
        head.append(nm, badge, stopBtn);
        const body = document.createElement('div'); body.className = 'squad-col-body';
        const actions = document.createElement('div'); actions.className = 'squad-col-actions';
        col.append(head, body, actions); board.appendChild(col);
        cols[t.id] = { id: t.id, name: t.name, branch: t.branch, ctx: makeStreamCtx(body, body), badge, stopBtn, actions, built: false };
      }
      streamSquad(run.run_id, cols);
    }

    async function streamSquad(runId, cols) {
      const seen = new Set();
      const res = await api('/api/squad/' + runId + '/events');
      const reader = res.body.getReader(); const dec = new TextDecoder(); let buf = '';
      while (true) {
        const { value, done } = await reader.read(); if (done) break;
        buf += dec.decode(value, { stream: true });
        const frames = buf.split('\n\n'); buf = frames.pop();
        for (const f of frames) {
          const line = f.split('\n').find((l) => l.startsWith('data:')); if (!line) continue;
          let ev; try { ev = JSON.parse(line.slice(5).trim()); } catch { continue; }
          if (ev.seq != null) { if (seen.has(ev.seq)) continue; seen.add(ev.seq); }
          const col = cols[ev.task_id]; if (!col) continue;
          if (ev.type === 'task_status') { squadStatus(runId, col, ev.status, ev.message); continue; }
          if (ev.type === 'usage') {
            if (ev.total_tokens) { const u = document.createElement('span'); u.className = 'usage-info'; u.textContent = fmtTokens(ev.total_tokens) + ' tok'; col.badge.after(u); }
            continue;
          }
          if (ev.type === 'user') continue; // squad columns show only agent output
          handleEvent(ev, col.ctx);
        }
      }
    }

    function squadStatus(runId, col, status, message) {
      col.badge.className = 'badge ' + status; col.badge.textContent = status;
      if (status === 'failed' && message) { col.ctx.body.style.display = ''; col.ctx.body.innerHTML += '<p class="err">' + escapeHtml(String(message).slice(0, 300)) + '</p>'; }
      const terminal = status === 'done' || status === 'failed' || status === 'stopped';
      if (terminal && col.stopBtn) { col.stopBtn.remove(); col.stopBtn = null; }
      if (terminal && !col.built) {
        col.built = true;
        const mk = (label, cls, fn) => { const b = document.createElement('button'); b.className = 'btn btn-sm ' + cls; b.textContent = label; b.onclick = fn; return b; };
        col.actions.append(
          mk('View diff', 'btn-ghost', () => squadDiff(runId, col.id, col.name)),
          mk('Apply', 'btn-primary', () => squadApply(runId, col.id)),
          mk('Open PR', 'btn-ghost', () => squadPr(runId, col.id)),
          mk('Discard', 'btn-ghost', () => squadDiscard(runId, col.id, col)),
        );
      }
    }
    async function squadStop(runId, taskId) {
      // The 'stopped' status arrives back over SSE and updates the column.
      await api('/api/squad/' + runId + '/' + taskId + '/stop', { method: 'POST' });
    }

    function renderDiff(diff) {
      return diff.split('\n').map((l) => {
        const e = escapeHtml(l);
        if (l.startsWith('+') && !l.startsWith('+++')) return '<span class="add">' + e + '</span>';
        if (l.startsWith('-') && !l.startsWith('---')) return '<span class="del">' + e + '</span>';
        if (l.startsWith('@@') || l.startsWith('diff ') || l.startsWith('index ') || l.startsWith('+++') || l.startsWith('---')) return '<span class="hd">' + e + '</span>';
        return e;
      }).join('\n');
    }
    async function squadDiff(runId, taskId, name) {
      const res = await api('/api/squad/' + runId + '/' + taskId + '/diff');
      const d = await res.json();
      const html = (d.stat ? '<div class="conn-empty">' + escapeHtml(d.stat) + '</div>' : '') +
        (d.diff ? '<div class="diff-pre">' + renderDiff(d.diff) + '</div>' : '<div class="conn-empty">No changes.</div>');
      await showHtmlModal(name + ' — diff', html);
    }
    async function squadApply(runId, taskId) {
      const ok = await confirmModal({ title: 'Apply to current branch', body: 'Squash this task’s changes onto your current branch (staged, not committed)?', confirmText: 'Apply', danger: false });
      if (!ok) return;
      const res = await api('/api/squad/' + runId + '/' + taskId + '/apply', { method: 'POST' });
      const d = await res.json().catch(() => ({}));
      await confirmModal({ title: res.ok ? 'Applied' : 'Apply failed', body: d.message || d.error || (res.ok ? 'Done.' : 'Failed.'), confirmText: 'OK', hideCancel: true, danger: false });
    }
    async function squadPr(runId, taskId) {
      const res = await api('/api/squad/' + runId + '/' + taskId + '/pr', { method: 'POST' });
      const d = await res.json().catch(() => ({}));
      const msg = d.url ? ('PR opened:\n' + d.url) : (d.message || (d.ok ? 'Done.' : 'Failed.'));
      await confirmModal({ title: 'Open PR', body: msg, confirmText: 'OK', hideCancel: true, danger: false });
    }
    async function squadDiscard(runId, taskId, col) {
      const ok = await confirmModal({ title: 'Discard task', body: 'Remove this worktree and its branch?', confirmText: 'Discard' });
      if (!ok) return;
      await api('/api/squad/' + runId + '/' + taskId + '/discard', { method: 'POST' });
      col.badge.className = 'badge failed'; col.badge.textContent = 'discarded'; col.actions.innerHTML = '';
    }

    // Lightweight HTML modal (reuses the confirm overlay) for the diff viewer.
    function showHtmlModal(title, html) {
      return new Promise((resolve) => {
        const overlay = $('modal-overlay'), ok = $('modal-ok'), cancel = $('modal-cancel'), body = $('modal-body'), input = $('modal-input');
        const modal = overlay.querySelector('.modal');
        $('modal-title').textContent = title;
        body.innerHTML = html; input.style.display = 'none'; cancel.style.display = 'none';
        ok.textContent = 'Close'; ok.className = 'btn btn-primary';
        modal.style.width = 'min(880px, 92vw)';
        overlay.classList.add('open');
        const done = () => { overlay.classList.remove('open'); modal.style.width = ''; body.textContent = ''; ok.removeEventListener('click', done); document.removeEventListener('keydown', onKey); resolve(); };
        const onKey = (e) => { if (e.key === 'Escape' || e.key === 'Enter') done(); };
        ok.addEventListener('click', done); document.addEventListener('keydown', onKey);
      });
    }

    loadConversations();
    // Lock in the full-capability agent, then load its models.
    ensureDefaultAgent().then(loadModels);
    loadCommandsSkills();
    inputEl.focus();
  </script>
</body>
</html>

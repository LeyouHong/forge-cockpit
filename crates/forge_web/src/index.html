<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forge</title>
  <style>
    /* Linear-inspired visual language (dark default, light aware). */
    :root {
      --bg: #08090a;
      --sidebar: #0c0d0f;
      --panel: #141518;
      --panel-2: #1a1b1f;
      --border: rgba(255,255,255,0.07);
      --border-strong: rgba(255,255,255,0.11);
      --text: #f7f8f8;
      --prose: #c4c8d0;
      --muted: #8a8f98;
      --faint: #62666d;
      --accent: #7c82e8;
      --accent-solid: #5e6ad2;
      --accent-weak: rgba(94,106,210,0.16);
      --user: #5e6ad2;
      --hover: rgba(255,255,255,0.045);
      --code: #0c0d0f;
      --danger: #eb5757;
      --shadow: 0 1px 2px rgba(0,0,0,0.28), 0 4px 16px rgba(0,0,0,0.18);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #ffffff;
        --sidebar: #fbfbfc;
        --panel: #ffffff;
        --panel-2: #f6f7f9;
        --border: rgba(0,0,0,0.08);
        --border-strong: rgba(0,0,0,0.13);
        --text: #17181c;
        --prose: #3b3f47;
        --muted: #6b6f76;
        --faint: #9599a1;
        --accent: #5e6ad2;
        --accent-solid: #5e6ad2;
        --accent-weak: rgba(94,106,210,0.10);
        --user: #5e6ad2;
        --hover: rgba(0,0,0,0.04);
        --code: #f5f6f8;
        --danger: #d93a3a;
        --shadow: 0 1px 2px rgba(0,0,0,0.06), 0 4px 14px rgba(0,0,0,0.05);
      }
    }
    :root[data-theme="light"] {
      --bg: #ffffff; --sidebar: #fbfbfc; --panel: #ffffff; --panel-2: #f6f7f9;
      --border: rgba(0,0,0,0.08); --border-strong: rgba(0,0,0,0.13);
      --text: #17181c; --prose: #3b3f47; --muted: #6b6f76; --faint: #9599a1;
      --accent: #5e6ad2; --accent-solid: #5e6ad2; --accent-weak: rgba(94,106,210,0.10);
      --user: #5e6ad2; --hover: rgba(0,0,0,0.04); --code: #f5f6f8; --danger: #d93a3a;
      --shadow: 0 1px 2px rgba(0,0,0,0.06), 0 4px 14px rgba(0,0,0,0.05);
    }
    :root[data-theme="dark"] {
      --bg: #08090a; --sidebar: #0c0d0f; --panel: #141518; --panel-2: #1a1b1f;
      --border: rgba(255,255,255,0.07); --border-strong: rgba(255,255,255,0.11);
      --text: #f7f8f8; --prose: #c4c8d0; --muted: #8a8f98; --faint: #62666d;
      --accent: #7c82e8; --accent-solid: #5e6ad2; --accent-weak: rgba(94,106,210,0.16);
      --user: #5e6ad2; --hover: rgba(255,255,255,0.045); --code: #0c0d0f; --danger: #eb5757;
      --shadow: 0 1px 2px rgba(0,0,0,0.28), 0 4px 16px rgba(0,0,0,0.18);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font: 14px/1.55 "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
      background: var(--bg); color: var(--text); display: flex; height: 100vh;
      letter-spacing: -0.006em;
    }
    ::selection { background: var(--accent-weak); }
    /* thin scrollbars */
    *::-webkit-scrollbar { width: 9px; height: 9px; }
    *::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
    *::-webkit-scrollbar-thumb:hover { background: var(--muted); background-clip: padding-box; }

    /* ---------- sidebar ---------- */
    aside {
      width: 248px; flex: 0 0 248px; background: var(--sidebar);
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
    }
    .brand {
      display: flex; align-items: center; gap: 8px; padding: 14px 16px 12px;
      font-weight: 600; font-size: 13.5px; letter-spacing: -0.01em;
    }
    .brand .logo {
      width: 20px; height: 20px; display: grid; place-items: center; border-radius: 6px;
      background: linear-gradient(140deg, var(--accent-solid), #8b93f0); color: #fff; font-size: 12px;
    }
    .new-btn {
      margin: 4px 12px 10px; height: 32px; display: flex; align-items: center; gap: 8px;
      padding: 0 10px; border: 1px solid var(--border); background: var(--panel);
      color: var(--text); border-radius: 7px; cursor: pointer; font-size: 13px; font-weight: 500;
      transition: background .13s ease, border-color .13s ease; box-shadow: var(--shadow);
    }
    .new-btn:hover { background: var(--panel-2); border-color: var(--border-strong); }
    .new-btn .plus { color: var(--muted); font-size: 15px; line-height: 1; }
    .section-label {
      padding: 6px 18px 4px; font-size: 11px; font-weight: 600; letter-spacing: .04em;
      text-transform: uppercase; color: var(--faint);
    }
    .convos { overflow-y: auto; flex: 1; padding: 0 8px 10px; }
    .convo {
      position: relative; display: flex; align-items: center; gap: 8px;
      height: 32px; padding: 0 8px; border-radius: 7px; cursor: pointer; color: var(--muted);
      font-size: 13px; transition: background .12s ease, color .12s ease;
    }
    .convo:hover { background: var(--hover); color: var(--text); }
    .convo.active { background: var(--accent-weak); color: var(--text); }
    .convo .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--faint); flex: 0 0 auto; }
    .convo.active .dot { background: var(--accent); }
    .convo .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .convo .del {
      opacity: 0; flex: 0 0 auto; width: 22px; height: 22px; display: grid; place-items: center;
      border: none; background: transparent; color: var(--faint); border-radius: 5px; cursor: pointer;
      font-size: 14px; transition: opacity .12s ease, background .12s ease, color .12s ease;
    }
    .convo:hover .del { opacity: 1; }
    .convo .del:hover { background: var(--hover); color: var(--danger); }

    /* ---------- main ---------- */
    main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .topbar {
      display: flex; gap: 10px; align-items: center; height: 48px; flex: 0 0 48px;
      padding: 0 20px; border-bottom: 1px solid var(--border);
    }
    .topbar .title { font-weight: 500; font-size: 13.5px; flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .usage-info { color: var(--faint); font-size: 11.5px; white-space: nowrap; font-family: "SF Mono", ui-monospace, Menlo, monospace; }
    .topbar .spacer { flex: 1; }
    .field { display: flex; align-items: center; gap: 6px; }
    .field label { color: var(--faint); font-size: 11.5px; font-weight: 500; }
    select {
      appearance: none; background: var(--panel); color: var(--text);
      border: 1px solid var(--border); border-radius: 7px; padding: 5px 26px 5px 9px; font: inherit;
      font-size: 12.5px; max-width: 190px; cursor: pointer; transition: border-color .12s ease, background .12s ease;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M2 3.5L5 6.5L8 3.5' stroke='%238a8f98' stroke-width='1.4' fill='none' stroke-linecap='round'/></svg>");
      background-repeat: no-repeat; background-position: right 8px center;
    }
    select:hover { border-color: var(--border-strong); }
    select:focus { outline: none; border-color: var(--accent-solid); box-shadow: 0 0 0 3px var(--accent-weak); }
    .icon-btn {
      width: 30px; height: 30px; display: grid; place-items: center; border: 1px solid var(--border);
      background: var(--panel); color: var(--muted); border-radius: 7px; cursor: pointer; font-size: 14px;
      transition: background .12s ease, color .12s ease, border-color .12s ease;
    }
    .icon-btn:hover { background: var(--panel-2); color: var(--text); border-color: var(--border-strong); }

    #messages { flex: 1; overflow-y: auto; padding: 28px 24px 8px; }
    .row { max-width: 760px; margin: 0 auto 20px; }
    .msg { padding: 11px 15px; border-radius: 11px; word-wrap: break-word; overflow-wrap: anywhere; font-size: 14px; }
    .msg.user { background: var(--user); color: #fff; margin-left: auto; max-width: 78%; width: fit-content; white-space: pre-wrap; box-shadow: var(--shadow); }
    /* Prose hierarchy à la Claude: soft body text, brighter headings/bold. */
    .msg.assistant { background: var(--panel); border: 1px solid var(--border); box-shadow: var(--shadow); color: var(--prose); line-height: 1.68; }
    .msg.assistant > *:first-child { margin-top: 0; }
    .msg.assistant > *:last-child { margin-bottom: 0; }
    .msg.assistant p { margin: 0 0 12px; }
    .msg.assistant strong { color: var(--text); font-weight: 600; }
    .msg.assistant em { color: var(--text); }
    .msg.assistant h1, .msg.assistant h2, .msg.assistant h3 { color: var(--text); margin: 18px 0 9px; line-height: 1.3; letter-spacing: -0.01em; font-weight: 600; }
    .msg.assistant h1 { font-size: 1.32em; } .msg.assistant h2 { font-size: 1.17em; } .msg.assistant h3 { font-size: 1.04em; }
    .msg.assistant ul, .msg.assistant ol { margin: 0 0 12px; padding-left: 22px; }
    .msg.assistant li { margin: 3px 0; }
    .msg.assistant li::marker { color: var(--faint); }
    .msg.assistant a { color: var(--accent); text-decoration: none; }
    .msg.assistant a:hover { text-decoration: underline; }
    .msg.assistant blockquote { margin: 0 0 12px; padding: 2px 0 2px 14px; border-left: 2.5px solid var(--border-strong); color: var(--muted); }
    /* tables */
    .msg.assistant .table-wrap { overflow-x: auto; margin: 0 0 12px; }
    .msg.assistant table { border-collapse: collapse; font-size: 13.5px; width: auto; }
    .msg.assistant th, .msg.assistant td { border: 1px solid var(--border-strong); padding: 7px 13px; text-align: left; vertical-align: top; }
    .msg.assistant th { background: var(--panel-2); color: var(--text); font-weight: 600; white-space: nowrap; }
    .msg.assistant td { color: var(--prose); }
    .msg.assistant tbody tr:nth-child(even) td, .msg.assistant tr:nth-child(even) td { background: rgba(127,127,127,0.035); }
    code.inline { background: var(--code); padding: 1.5px 5px; border-radius: 5px; font-family: "SF Mono", ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.86em; border: 1px solid var(--border); }
    pre.code { background: var(--code); border: 1px solid var(--border); border-radius: 9px; padding: 12px 14px; overflow-x: auto; margin: 0 0 10px; }
    pre.code code { font-family: "SF Mono", ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12.5px; white-space: pre; line-height: 1.55; color: var(--prose); }
    /* syntax highlight palette (One Dark / One Light) */
    :root { --c-com:#7f848e; --c-str:#98c379; --c-num:#d19a66; --c-kw:#c678dd; --c-typ:#e5c07b; --c-fn:#61afef; }
    @media (prefers-color-scheme: light) { :root { --c-com:#a0a1a7; --c-str:#50a14f; --c-num:#b76b01; --c-kw:#a626a4; --c-typ:#986801; --c-fn:#4078f2; } }
    :root[data-theme="light"] { --c-com:#a0a1a7; --c-str:#50a14f; --c-num:#b76b01; --c-kw:#a626a4; --c-typ:#986801; --c-fn:#4078f2; }
    :root[data-theme="dark"] { --c-com:#7f848e; --c-str:#98c379; --c-num:#d19a66; --c-kw:#c678dd; --c-typ:#e5c07b; --c-fn:#61afef; }
    pre.code .c-com { color: var(--c-com); font-style: italic; }
    pre.code .c-str { color: var(--c-str); }
    pre.code .c-num { color: var(--c-num); }
    pre.code .c-kw  { color: var(--c-kw); }
    pre.code .c-typ { color: var(--c-typ); }
    pre.code .c-fn  { color: var(--c-fn); }
    .code-block { position: relative; }
    .code-block .copy-btn {
      position: absolute; top: 8px; right: 8px; opacity: 0;
      height: 26px; padding: 0 10px; font: inherit; font-size: 11.5px; font-weight: 500;
      color: var(--muted); background: var(--panel-2); border: 1px solid var(--border-strong);
      border-radius: 6px; cursor: pointer; transition: opacity .12s ease, color .12s ease, background .12s ease;
    }
    .code-block:hover .copy-btn, .code-block .copy-btn:focus-visible { opacity: 1; }
    .code-block .copy-btn:hover { color: var(--text); background: var(--panel); }
    .code-block .copy-btn.copied { color: #3fb950; border-color: #3fb950; opacity: 1; }
    .reasoning-wrap { margin: 2px 0 8px; }
    .reasoning-wrap > summary { color: var(--faint); font-size: 12px; cursor: pointer; user-select: none; list-style: none; display: inline-flex; align-items: center; gap: 6px; }
    .reasoning-wrap > summary::-webkit-details-marker { display: none; }
    .reasoning-wrap > summary::before { content: '💭'; }
    .reasoning-wrap[open] > summary::after { content: 'hide'; color: var(--faint); font-size: 11px; }
    .reasoning-wrap:not([open]) > summary::after { content: 'show'; color: var(--faint); font-size: 11px; }
    .reasoning { color: var(--muted); font-size: 12.5px; border-left: 2px solid var(--border-strong); padding: 4px 0 1px 11px; margin: 6px 0 0; white-space: pre-wrap; }
    .tool { display: inline-flex; align-items: center; gap: 6px; background: var(--panel); border: 1px solid var(--border); color: var(--muted); border-radius: 7px; padding: 4px 10px; font-size: 12px; margin: 3px 5px 3px 0; font-family: "SF Mono", ui-monospace, Menlo, monospace; cursor: pointer; transition: border-color .12s ease; }
    .tool:hover { border-color: var(--border-strong); }
    .tool .k { color: var(--accent); }
    .tool-out { background: var(--code); border: 1px solid var(--border); border-radius: 9px; padding: 10px 12px; margin: 3px 0 8px; overflow: auto; font-size: 12px; font-family: "SF Mono", ui-monospace, Menlo, monospace; white-space: pre; max-height: 320px; }
    .err { color: var(--danger); }

    footer { border-top: 1px solid var(--border); padding: 14px 24px 18px; }
    .composer { max-width: 760px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; background: var(--panel); border: 1px solid var(--border); border-radius: 13px; padding: 8px 8px 8px 14px; box-shadow: var(--shadow); transition: border-color .12s ease; }
    .composer:focus-within { border-color: var(--accent-solid); box-shadow: 0 0 0 3px var(--accent-weak); }
    textarea { flex: 1; resize: none; background: transparent; color: var(--text); border: none; padding: 6px 0; font: inherit; max-height: 200px; min-height: 26px; line-height: 1.5; }
    textarea:focus { outline: none; }
    textarea::placeholder { color: var(--faint); }
    #send { flex: 0 0 auto; background: var(--accent-solid); color: #fff; border: none; border-radius: 9px; width: 34px; height: 34px; cursor: pointer; font-size: 15px; display: grid; place-items: center; transition: opacity .12s ease, transform .06s ease, background .12s ease; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
    #send.stop { background: var(--danger); font-size: 12px; }
    #send:hover { opacity: .92; } #send:active { transform: scale(0.94); }
    #send:disabled { opacity: .4; cursor: default; }
    .empty { color: var(--faint); text-align: center; margin-top: 22vh; font-size: 14px; }
    .empty .big { font-size: 22px; margin-bottom: 6px; opacity: .8; }
    /* slash command / skill palette */
    .cmd-palette { display: none; max-width: 760px; margin: 0 auto 8px; background: var(--panel); border: 1px solid var(--border-strong); border-radius: 11px; box-shadow: var(--shadow); max-height: 280px; overflow-y: auto; }
    .cmd-palette.open { display: block; }
    .cmd-sec { padding: 8px 13px 3px; font-size: 10.5px; text-transform: uppercase; letter-spacing: .04em; color: var(--faint); }
    .cmd-item { display: flex; gap: 10px; align-items: baseline; padding: 7px 13px; cursor: pointer; }
    .cmd-item.sel, .cmd-item:hover { background: var(--hover); }
    .cmd-item .k { font-family: "SF Mono", ui-monospace, Menlo, monospace; font-size: 12.5px; color: var(--accent); flex: 0 0 auto; }
    .cmd-item .d { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .retry-btn { margin-top: 6px; }
    /* image attachments */
    .composer-btn { flex: 0 0 auto; background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 17px; width: 30px; height: 34px; display: grid; place-items: center; border-radius: 8px; }
    .composer-btn:hover { color: var(--text); background: var(--hover); }
    .attach-preview { max-width: 760px; margin: 0 auto 8px; display: flex; flex-wrap: wrap; gap: 8px; }
    .attach-preview:empty { display: none; }
    .thumb { position: relative; width: 56px; height: 56px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .thumb .rm { position: absolute; top: 1px; right: 1px; width: 16px; height: 16px; border-radius: 50%; border: none; background: rgba(0,0,0,.6); color: #fff; font-size: 11px; cursor: pointer; display: grid; place-items: center; line-height: 1; }
    .msg .msg-img { max-width: 240px; max-height: 220px; border-radius: 8px; margin-top: 6px; display: block; }
    /* hamburger hidden on wide screens */
    .hamburger { display: none; }
    @media (max-width: 760px) {
      aside { position: fixed; z-index: 80; left: 0; top: 0; bottom: 0; transform: translateX(-100%); transition: transform .18s ease; box-shadow: 6px 0 24px rgba(0,0,0,.3); }
      body.sidebar-open aside { transform: none; }
      body.sidebar-open::after { content: ''; position: fixed; inset: 0; z-index: 70; background: rgba(0,0,0,.4); }
      .hamburger { display: grid; }
      .drawer { width: 100vw; flex-basis: 100vw; }
      .topbar .field label { display: none; }
      select { max-width: 130px; }
    }

    /* ---------- modal ---------- */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100; display: none;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
    }
    .modal-overlay.open { display: flex; animation: fade .12s ease; }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      width: 400px; max-width: calc(100vw - 40px); background: var(--panel);
      border: 1px solid var(--border-strong); border-radius: 13px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.45); padding: 22px 22px 18px;
      animation: pop .13s cubic-bezier(.2,.8,.3,1);
    }
    @keyframes pop { from { transform: scale(.96) translateY(4px); opacity: 0; } to { transform: none; opacity: 1; } }
    .modal-title { font-weight: 600; font-size: 15px; letter-spacing: -0.01em; margin-bottom: 8px; }
    .modal-body { color: var(--muted); font-size: 13.5px; line-height: 1.55; margin-bottom: 22px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
    .btn {
      height: 33px; padding: 0 15px; border-radius: 8px; font: inherit; font-size: 13px; font-weight: 500;
      cursor: pointer; border: 1px solid transparent; transition: background .12s ease, border-color .12s ease, opacity .12s ease;
    }
    .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
    .btn-ghost { background: var(--panel-2); border-color: var(--border); color: var(--text); }
    .btn-ghost:hover { border-color: var(--border-strong); background: var(--hover); }
    .btn-primary { background: var(--accent-solid); color: #fff; }
    .btn-primary:hover { opacity: .92; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { opacity: .92; }
    .btn-sm { height: 28px; padding: 0 11px; font-size: 12px; }
    .modal-input {
      width: 100%; margin: -8px 0 20px; background: var(--panel-2); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px; padding: 9px 11px; font: inherit; font-size: 13.5px;
    }
    .modal-input:focus { outline: none; border-color: var(--accent-solid); box-shadow: 0 0 0 3px var(--accent-weak); }

    /* ---------- settings drawer ---------- */
    .drawer-overlay {
      position: fixed; inset: 0; z-index: 90; display: none; justify-content: flex-end;
      background: rgba(0,0,0,0.42); backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
    }
    .drawer-overlay.open { display: flex; animation: fade .12s ease; }
    .drawer {
      width: 400px; max-width: 100vw; flex: 0 0 400px; height: 100%; background: var(--panel);
      border-left: 1px solid var(--border-strong); display: flex; flex-direction: column;
      box-shadow: -8px 0 32px rgba(0,0,0,0.35); animation: slidein .16s cubic-bezier(.2,.8,.3,1);
    }
    @keyframes slidein { from { transform: translateX(24px); opacity: .6; } to { transform: none; opacity: 1; } }
    .drawer-head { display: flex; align-items: center; justify-content: space-between; padding: 15px 18px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 14px; }
    /* `scrollbar-gutter: stable` reserves the scrollbar space always, so the
       content width doesn't jump when a section expands and the scrollbar appears. */
    .drawer-body { overflow-y: auto; scrollbar-gutter: stable; padding: 8px 14px 24px 18px; }
    .drawer-body section { margin-top: 18px; }
    .drawer-h { font-size: 12px; font-weight: 600; letter-spacing: .03em; text-transform: uppercase; color: var(--muted); margin: 0 0 10px; }
    .drawer-hint { text-transform: none; letter-spacing: 0; font-weight: 400; color: var(--faint); font-size: 11.5px; margin-left: 6px; }
    .add-row { display: flex; gap: 6px; margin-bottom: 12px; }
    .add-row input {
      flex: 1; min-width: 0; background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
      border-radius: 7px; padding: 7px 9px; font: inherit; font-size: 12.5px;
    }
    .add-row input:focus { outline: none; border-color: var(--accent-solid); }
    .conn-list { display: flex; flex-direction: column; gap: 8px; }
    .conn {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      border: 1px solid var(--border); border-radius: 10px; background: var(--panel-2);
    }
    .conn .info { flex: 1; min-width: 0; }
    .conn .nm { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .conn .sub { font-size: 11.5px; color: var(--faint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .conn .actions { display: flex; gap: 6px; flex: 0 0 auto; }
    .badge { font-size: 10.5px; font-weight: 600; padding: 2px 7px; border-radius: 20px; letter-spacing: .02em; }
    .badge.on { background: rgba(63,185,80,0.16); color: #3fb950; }
    .badge.off { background: var(--hover); color: var(--muted); }
    .conn-empty { color: var(--faint); font-size: 12.5px; padding: 6px 2px; }

    /* ---------- parallel tasks (squad) ---------- */
    .squad-overlay { position: fixed; inset: 0; z-index: 95; display: none; flex-direction: column; background: var(--bg); }
    .squad-overlay.open { display: flex; animation: fade .12s ease; }
    .squad-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 22px; border-bottom: 1px solid var(--border); font-size: 14px; flex: 0 0 auto; }
    .squad-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; padding: 18px 22px; }
    #squad-launcher { max-width: 720px; width: 100%; margin: 0 auto; }
    .squad-mode { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 14px; }
    .squad-mode .seg { padding: 7px 14px; background: transparent; border: none; color: var(--muted); font: inherit; font-size: 12.5px; cursor: pointer; }
    .squad-mode .seg.sel { background: var(--accent-solid); color: #fff; }
    #squad-bestof-form textarea { width: 100%; min-height: 80px; background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font: inherit; font-size: 13px; resize: vertical; }
    #squad-bestof-form textarea:focus { outline: none; border-color: var(--accent-solid); }
    .squad-task { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-start; }
    .squad-task input { flex: 0 0 150px; }
    .squad-task textarea { flex: 1; min-height: 38px; max-height: 120px; resize: vertical; }
    .squad-task input, .squad-task textarea { background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font: inherit; font-size: 13px; }
    .squad-task input:focus, .squad-task textarea:focus { outline: none; border-color: var(--accent-solid); }
    .squad-task .del { flex: 0 0 auto; }
    .squad-run-row { display: flex; align-items: center; gap: 14px; margin-top: 12px; }
    .squad-run-row .field { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 12px; }
    .squad-run-row input { width: 70px; background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 7px; padding: 6px 8px; font: inherit; font-size: 12.5px; }
    .squad-run-row #squad-base { width: 150px; }
    .squad-run-row #squad-run { margin-left: auto; }
    /* board: N columns side by side, horizontal scroll */
    .squad-board { flex: 1; display: none; gap: 12px; overflow-x: auto; overflow-y: hidden; padding-top: 4px; }
    .squad-board.live { display: flex; }
    .squad-col { flex: 0 0 340px; display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: 12px; background: var(--panel); overflow: hidden; }
    .squad-col-head { display: flex; align-items: center; gap: 8px; padding: 10px 13px; border-bottom: 1px solid var(--border); }
    .squad-col-head .nm { font-weight: 600; font-size: 13px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .squad-col-body { flex: 1; overflow-y: auto; padding: 12px 13px; font-size: 13.5px; color: var(--prose); }
    .squad-col-body .msg.assistant { border: none; box-shadow: none; background: transparent; padding: 0; }
    .squad-col-actions { display: flex; gap: 6px; padding: 9px 13px; border-top: 1px solid var(--border); }
    .squad-col-actions:empty { display: none; }
    .badge.running { background: var(--accent-weak); color: var(--accent); }
    .badge.done { background: rgba(63,185,80,0.16); color: #3fb950; }
    .badge.failed { background: rgba(235,87,87,0.16); color: var(--danger); }
    .badge.stopped, .badge.discarded { background: var(--hover); color: var(--muted); }
    #squad-leftovers { margin-top: 20px; }
    #squad-leftovers:empty { display: none; }
    .leftover-h { font-size: 12px; font-weight: 600; letter-spacing: .03em; text-transform: uppercase; color: var(--muted); margin: 0 0 8px; }
    .leftover { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 9px; background: var(--panel-2); margin-bottom: 6px; }
    .leftover .info { flex: 1; min-width: 0; }

    .diff-pre { background: var(--code); border: 1px solid var(--border); border-radius: 8px; padding: 12px; overflow: auto; max-height: 60vh; font-family: "SF Mono", ui-monospace, Menlo, monospace; font-size: 12px; white-space: pre; }
    .diff-pre .add { color: #3fb950; } .diff-pre .del { color: var(--danger); } .diff-pre .hd { color: var(--accent); }
    .gh-card { border: 1px solid var(--border); border-radius: 11px; background: var(--panel-2); padding: 13px 14px; }

    .prov-section[open] summary::before { content: '▾'; }
    .prov-section summary:hover { color: var(--text); }
  </style>
</head>
<body>

  <!-- Settings / connections drawer -->

  <script>
    const TOKEN = "__FORGE_TOKEN__";
    // Remove the token from the address bar so it doesn't linger in history /
    // shoulder-surfing. It stays in memory (JS) for API calls.
    try { history.replaceState({}, '', location.pathname); } catch (e) {}
    const $ = (id) => document.getElementById(id);
    const messagesEl = $('messages'), convosEl = $('convos'), inputEl = $('input');
    let conversationId = null;
    let streaming = false;
    let pendingImages = [];

    // Every API call carries the per-run bearer token. Using a custom header
    // (rather than a cookie) also blocks cross-origin CSRF, since the browser
    // won't let other pages set it without a CORS grant we never issue.
    function api(url, opts = {}) {
      opts.headers = Object.assign({ Authorization: 'Bearer ' + TOKEN }, opts.headers || {});
      return fetch(url, opts);
    }
    function scrollDown() { messagesEl.scrollTop = messagesEl.scrollHeight; }

    /* ---------- theme toggle ---------- */
    (function initTheme() {
      const saved = localStorage.getItem('forge-theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    })();
    $('theme').onclick = () => {
      const cur = document.documentElement.getAttribute('data-theme');
      const dark = cur ? cur === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches;
      const next = dark ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('forge-theme', next);
    };

    /* ---------- confirm modal (replaces native confirm/alert) ---------- */
    function confirmModal({ title, body, confirmText = 'Delete', hideCancel = false, danger = true, input = null }) {
      return new Promise((resolve) => {
        const overlay = $('modal-overlay'), ok = $('modal-ok'), cancel = $('modal-cancel'), field = $('modal-input');
        $('modal-title').textContent = title;
        $('modal-body').textContent = body;
        ok.textContent = confirmText;
        // Destructive → danger button; input/acknowledgement → neutral primary.
        ok.className = 'btn ' + ((danger && !input && !hideCancel) ? 'btn-danger' : 'btn-primary');
        cancel.style.display = hideCancel ? 'none' : '';
        if (input) {
          field.style.display = ''; field.value = input.value || '';
          field.placeholder = input.placeholder || ''; field.type = input.type || 'text';
        } else { field.style.display = 'none'; }
        overlay.classList.add('open');
        setTimeout(() => (input ? field : ok).focus(), 0);

        // Resolve value: boolean for confirms; the string (or null) for prompts.
        const result = (okPressed) => input ? (okPressed ? field.value : null) : okPressed;
        const done = (okPressed) => {
          overlay.classList.remove('open');
          ok.removeEventListener('click', onOk);
          cancel.removeEventListener('click', onCancel);
          document.removeEventListener('keydown', onKey);
          overlay.removeEventListener('mousedown', onBackdrop);
          resolve(result(okPressed));
        };
        const onOk = () => done(true);
        const onCancel = () => done(false);
        const onKey = (e) => {
          if (e.key === 'Escape') done(false);
          else if (e.key === 'Enter' && !e.isComposing && e.keyCode !== 229 && (!input || e.target === field)) done(true);
        };
        const onBackdrop = (e) => { if (e.target === overlay) done(false); };
        ok.addEventListener('click', onOk);
        cancel.addEventListener('click', onCancel);
        document.addEventListener('keydown', onKey);
        overlay.addEventListener('mousedown', onBackdrop);
      });
    }

    /* ---------- tiny markdown renderer (XSS-safe: escapes before formatting) ---------- */
    function escapeHtml(s) {
      return s.replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    }

    // Compact, language-agnostic syntax highlighter. Tokenizes the raw code and
    // escapes every gap/token, so it stays XSS-safe. Good enough for Rust, JS,
    // Python, Go, C-likes, etc. — not a full parser.
    const HL_KEYWORDS = new Set(('fn let mut pub struct enum impl trait const static type where as dyn move use mod crate self super match if else for while loop break continue return in of async await unsafe extern box ref ' +
      'function var class extends typeof instanceof void export import default yield this new delete throw switch case do try catch finally ' +
      'def pass lambda global nonlocal elif except finally raise with del not and or is print assert ' +
      'func package interface defer go chan range select ' +
      'public private protected final abstract implements throws extends ' +
      'true false null nil undefined None True False').split(/\s+/));
    const HASH_COMMENT_LANGS = new Set(['py', 'python', 'sh', 'bash', 'shell', 'zsh', 'rb', 'ruby', 'yaml', 'yml', 'toml', 'ini', 'r', 'perl', 'pl', 'makefile', 'dockerfile']);

    function highlightCode(code, lang) {
      const hash = HASH_COMMENT_LANGS.has((lang || '').toLowerCase());
      const comment = hash ? '\\/\\/[^\\n]*|\\/\\*[\\s\\S]*?\\*\\/|#[^\\n]*' : '\\/\\/[^\\n]*|\\/\\*[\\s\\S]*?\\*\\/';
      const RE = new RegExp(
        '(' + comment + ')' +                                    // 1 comment
        '|("(?:\\\\.|[^"\\\\])*"|\'(?:\\\\.|[^\'\\\\])*\'|`(?:\\\\.|[^`\\\\])*`)' + // 2 string
        '|(\\b0x[0-9a-fA-F]+\\b|\\b\\d[\\d_]*\\.?\\d*(?:[eE][+-]?\\d+)?\\b)' +       // 3 number
        '|([A-Za-z_$][A-Za-z0-9_$]*)' +                          // 4 word (keyword/type/plain)
        '|([a-z_$][A-Za-z0-9_$]*)(?=\\s*\\()',                   // (unused; fn handled below)
        'g');
      let out = '', last = 0, m;
      while ((m = RE.exec(code))) {
        out += escapeHtml(code.slice(last, m.index));
        const full = m[0];
        let cls;
        if (m[1]) cls = 'c-com';
        else if (m[2]) cls = 'c-str';
        else if (m[3]) cls = 'c-num';
        else if (m[4]) {
          if (HL_KEYWORDS.has(full)) cls = 'c-kw';
          else if (/^[A-Z]/.test(full)) cls = 'c-typ';
          else if (code.slice(m.index + full.length).match(/^\s*\(/)) cls = 'c-fn';
          else cls = null;
        }
        out += cls ? '<span class="' + cls + '">' + escapeHtml(full) + '</span>' : escapeHtml(full);
        last = m.index + full.length;
        if (full.length === 0) RE.lastIndex++;
      }
      out += escapeHtml(code.slice(last));
      return out;
    }

    function renderMarkdown(src) {
      const blocks = [];
      // Fenced code blocks first, swapped for collision-proof placeholders.
      src = src.replace(/```([^\n]*)\n?([\s\S]*?)```/g, (m, lang, code) => {
        blocks.push(
          '<div class="code-block"><button class="copy-btn" type="button">Copy</button>' +
          '<pre class="code"><code>' + highlightCode(code.replace(/\n$/, ''), lang.trim()) + '</code></pre></div>'
        );
        return '%%FBLK' + (blocks.length - 1) + '%%';
      });
      src = escapeHtml(src);
      src = src.replace(/`([^`]+)`/g, (m, c) => '<code class="inline">' + c + '</code>');
      src = src.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      src = src.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
      src = src.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

      const lines = src.split('\n');
      let html = '', list = null;
      const closeList = () => { if (list) { html += '</' + list + '>'; list = null; } };
      const isRow = (l) => /\|/.test(l) && /\S/.test(l);
      const isSep = (l) => /^\s*\|?[\s:|-]*-[\s:|-]*\|?\s*$/.test(l) && /\|/.test(l);
      const cells = (l) => l.replace(/^\s*\|/, '').replace(/\|\s*$/, '').split('|').map((c) => c.trim());
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i]; let m;
        // GitHub-style table: header row + separator row + body rows.
        if (isRow(line) && i + 1 < lines.length && isSep(lines[i + 1])) {
          closeList();
          const head = cells(line);
          let j = i + 2; const rows = [];
          while (j < lines.length && isRow(lines[j]) && !isSep(lines[j])) { rows.push(cells(lines[j])); j++; }
          let t = '<div class="table-wrap"><table><thead><tr>';
          for (const h of head) t += '<th>' + h + '</th>';
          t += '</tr></thead><tbody>';
          for (const r of rows) {
            t += '<tr>';
            for (let k = 0; k < head.length; k++) t += '<td>' + (r[k] || '') + '</td>';
            t += '</tr>';
          }
          t += '</tbody></table></div>';
          html += t; i = j - 1; continue;
        }
        if ((m = line.trim().match(/^%%FBLK(\d+)%%$/))) { closeList(); html += blocks[m[1]]; continue; }
        if ((m = line.match(/^(#{1,3})\s+(.*)$/))) { closeList(); html += '<h' + m[1].length + '>' + m[2] + '</h' + m[1].length + '>'; continue; }
        if ((m = line.match(/^\s*>\s?(.*)$/))) { closeList(); html += '<blockquote>' + m[1] + '</blockquote>'; continue; }
        if ((m = line.match(/^\s*[-*]\s+(.*)$/))) { if (list !== 'ul') { closeList(); list = 'ul'; html += '<ul>'; } html += '<li>' + m[1] + '</li>'; continue; }
        if ((m = line.match(/^\s*\d+\.\s+(.*)$/))) { if (list !== 'ol') { closeList(); list = 'ol'; html += '<ol>'; } html += '<li>' + m[1] + '</li>'; continue; }
        if (line.trim() === '') { closeList(); continue; }
        closeList();
        html += '<p>' + line + '</p>';
      }
      closeList();
      html = html.replace(/%%FBLK(\d+)%%/g, (m, i) => blocks[i]);
      return html;
    }

    /* ---------- message elements ---------- */
    function clearMessages() { messagesEl.innerHTML = ''; }
    function addUser(text, images) {
      const row = document.createElement('div'); row.className = 'row';
      const b = document.createElement('div'); b.className = 'msg user';
      if (text) b.textContent = text;
      for (const im of (images || [])) {
        const img = document.createElement('img'); img.className = 'msg-img';
        img.src = 'data:' + im.mime + ';base64,' + im.base64; b.appendChild(img);
      }
      row.appendChild(b); messagesEl.appendChild(row); scrollDown();
    }
    function addAssistantBubble(markdown) {
      const row = document.createElement('div'); row.className = 'row';
      const b = document.createElement('div'); b.className = 'msg assistant';
      b.innerHTML = renderMarkdown(markdown || '');
      row.appendChild(b); messagesEl.appendChild(row);
    }
    function toolChip(label, name, output) {
      const wrap = document.createElement('div');
      const c = document.createElement('span'); c.className = 'tool';
      const k = document.createElement('span'); k.className = 'k'; k.textContent = label;
      c.append(k, document.createTextNode(name));
      wrap.appendChild(c);
      if (output != null && output !== '') {
        const pre = document.createElement('div'); pre.className = 'tool-out';
        pre.textContent = output; pre.style.display = 'none';
        c.onclick = () => { pre.style.display = pre.style.display === 'none' ? 'block' : 'none'; };
        c.title = 'Toggle output';
        wrap.appendChild(pre);
      }
      return wrap;
    }
    // Builds the streaming elements (reasoning / tools / body) inside `parent`
    // and returns a context reused by handleEvent. `scrollEl` is what auto-scrolls.
    function makeStreamCtx(parent, scrollEl) {
      const reasoning = document.createElement('details'); reasoning.className = 'reasoning-wrap'; reasoning.open = true; reasoning.style.display = 'none';
      const rsum = document.createElement('summary'); rsum.textContent = 'Reasoning';
      const reasoningBody = document.createElement('div'); reasoningBody.className = 'reasoning';
      reasoning.append(rsum, reasoningBody);
      const tools = document.createElement('div');
      const body = document.createElement('div'); body.className = 'msg assistant'; body.style.display = 'none';
      parent.append(reasoning, tools, body);
      const ctx = { reasoning, reasoningBody, tools, body, raw: '' };
      ctx.scroll = () => { if (scrollEl) scrollEl.scrollTop = scrollEl.scrollHeight; };
      return ctx;
    }
    function addStreamingAssistant() {
      const row = document.createElement('div'); row.className = 'row';
      messagesEl.appendChild(row);
      return makeStreamCtx(row, messagesEl);
    }

    /* ---------- conversations ---------- */
    function makeConvoRow(id, label, active) {
      const row = document.createElement('div');
      row.className = 'convo' + (active ? ' active' : '');
      const dot = document.createElement('span'); dot.className = 'dot';
      const name = document.createElement('span'); name.className = 'name';
      name.textContent = label; name.title = label + '  (double-click to rename)';
      name.ondblclick = (e) => { e.stopPropagation(); renameConversation(id, label); };
      const del = document.createElement('button'); del.className = 'del'; del.textContent = '×'; del.title = 'Delete';
      del.onclick = (e) => { e.stopPropagation(); deleteConversation(id, label); };
      row.append(dot, name, del);
      row.onclick = () => { selectConversation(id, label); document.body.classList.remove('sidebar-open'); };
      return row;
    }

    async function renameConversation(id, current) {
      const title = await confirmModal({ title: 'Rename conversation', body: 'New title:', confirmText: 'Rename', danger: false, input: { value: current === 'New chat' ? '' : current, placeholder: 'Conversation title' } });
      if (title == null || !title.trim()) return;
      const res = await api('/api/conversations/' + id + '/rename', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title: title.trim() }) });
      if (res.ok && id === conversationId) $('conv-title').textContent = title.trim();
      loadConversations();
    }

    async function loadConversations() {
      const res = await api('/api/conversations');
      const list = await res.json();
      convosEl.innerHTML = '';
      const ids = new Set(list.map((c) => c.id));
      // Optimistic entry: a just-created conversation isn't returned by the
      // backend until it has content, so surface it immediately as "New chat".
      if (conversationId && !ids.has(conversationId)) {
        convosEl.appendChild(makeConvoRow(conversationId, 'New chat', true));
      }
      for (const c of list) {
        // Forge fills `title` automatically once a turn completes; until then a
        // conversation shows "New chat" rather than a raw id.
        convosEl.appendChild(makeConvoRow(c.id, c.title || 'New chat', c.id === conversationId));
      }
    }

    async function deleteConversation(id, label) {
      const ok = await confirmModal({
        title: 'Delete conversation',
        body: 'Delete “' + label + '”? This can’t be undone.',
        confirmText: 'Delete',
      });
      if (!ok) return;
      const res = await api('/api/conversations/' + id, { method: 'DELETE' });
      if (!res.ok) { await confirmModal({ title: 'Delete failed', body: 'Could not delete this conversation.', confirmText: 'OK', hideCancel: true }); return; }
      if (id === conversationId) {
        conversationId = null;
        $('conv-title').textContent = 'Forge';
        messagesEl.innerHTML = '<div class="empty"><div class="big">⚒</div>Conversation deleted.</div>';
      }
      await loadConversations();
    }

    async function newConversation() {
      const res = await api('/api/conversations', { method: 'POST' });
      const c = await res.json();
      conversationId = c.id;
      $('conv-title').textContent = 'New chat';
      messagesEl.innerHTML = '<div class="empty"><div class="big">⚒</div>Say something to get started.</div>';
      await loadConversations();
      inputEl.focus();
    }

    async function selectConversation(id, label) {
      conversationId = id;
      messagesEl.innerHTML = '<div class="empty">Loading…</div>';
      const res = await api('/api/conversations/' + id + '/messages');
      if (!res.ok) { messagesEl.innerHTML = '<div class="empty err">Failed to load.</div>'; return; }
      const msgs = await res.json();
      $('conv-title').textContent = label || 'Conversation';
      clearMessages();
      renderHistory(msgs);
      refreshUsage(id);
      await loadConversations();
      // Resume an in-flight turn, if one is still running server-side.
      attachLive(id, {});
    }

    function renderHistory(msgs) {
      let rendered = 0;
      for (const m of msgs) {
        if (m.kind === 'text') {
          if (m.role === 'system') continue;
          if (m.role === 'user') addUser(m.content);
          else {
            if (m.content && m.content.trim()) addAssistantBubble(m.content);
            for (const tc of (m.tool_calls || [])) {
              const row = document.createElement('div'); row.className = 'row';
              row.appendChild(toolChip('⚙ ', tc, null)); messagesEl.appendChild(row);
            }
          }
          rendered++;
        } else if (m.kind === 'tool') {
          const row = document.createElement('div'); row.className = 'row';
          row.appendChild(toolChip('▸ ', m.name, m.output)); messagesEl.appendChild(row);
          rendered++;
        } else if (m.kind === 'image') {
          const row = document.createElement('div'); row.className = 'row';
          row.appendChild(toolChip('🖼 ', 'image', null)); messagesEl.appendChild(row);
          rendered++;
        }
      }
      if (rendered === 0) messagesEl.innerHTML = '<div class="empty">No messages yet — continue below.</div>';
      scrollDown();
    }

    /* ---------- agent / model pickers ---------- */
    // The agent picker is intentionally hidden: this UI always uses the
    // full-capability "forge" agent (code + shell + MCP/GitHub tools) so users
    // don't have to understand the agent modes. Falls back to the first agent
    // if "forge" isn't available.
    async function ensureDefaultAgent() {
      const res = await api('/api/agents'); const list = await res.json();
      const pick = list.find((a) => a.id === 'forge') || list[0];
      if (pick && !pick.active) {
        await api('/api/agents', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: pick.id }) });
      }
    }
    const modelSupportsImage = {};
    async function loadModels() {
      const res = await api('/api/models'); const list = await res.json();
      const sel = $('model'); sel.innerHTML = '';
      for (const m of list) {
        modelSupportsImage[m.id] = !!m.supports_image;
        const o = document.createElement('option');
        o.value = m.id; o.textContent = m.name || m.id; o.selected = m.active; sel.appendChild(o);
      }
    }
    $('model').onchange = async (e) => {
      await api('/api/models', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: e.target.value }) });
    };

    /* ---------- chat streaming (resumable turns) ---------- */
    // Turns run server-side and survive page refreshes: POST /api/chat starts a
    // background turn; GET /api/chat/{conv}/live replays + streams its events.
    async function send() {
      const text = inputEl.value.trim();
      const images = pendingImages.slice();
      if ((!text && !images.length) || streaming) return;
      inputEl.value = ''; autoGrow(); clearAttachments();
      await runTurn(text, images);
    }

    async function runTurn(text, images) {
      if (!conversationId) await newConversation();
      const first = messagesEl.querySelector('.empty');
      if (first) first.remove();
      addUser(text, images);
      const res = await api('/api/chat', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ conversation_id: conversationId, message: text, images }),
      });
      if (!res.ok) {
        const out = addStreamingAssistant();
        out.body.style.display = ''; out.body.classList.add('err');
        const e = await res.json().catch(() => ({}));
        out.body.textContent = 'Error: ' + (e.error || ('HTTP ' + res.status));
        const retry = document.createElement('button');
        retry.className = 'btn btn-sm btn-ghost retry-btn'; retry.textContent = 'Retry';
        retry.onclick = () => { if (!streaming) runTurn(text, images); };
        out.body.appendChild(retry);
        return;
      }
      await attachLive(conversationId, { skipUser: true });
    }

    // Attaches to a conversation's live turn (if any). Renders replayed +
    // live events; used both right after send() and to resume after a refresh.
    async function attachLive(convId, opts) {
      const res = await api('/api/chat/' + convId + '/live');
      if (!res.ok) return false; // no active turn — nothing to resume
      streaming = true; setStreamingUI(true);
      let out = null; // created lazily so the user bubble lands first
      const seen = new Set();
      let skipUser = !!(opts && opts.skipUser);
      try {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const frames = buffer.split('\n\n');
          buffer = frames.pop();
          for (const frame of frames) {
            const line = frame.split('\n').find((l) => l.startsWith('data:'));
            if (!line) continue;
            let ev; try { ev = JSON.parse(line.slice(5).trim()); } catch { continue; }
            if (ev.seq != null) { if (seen.has(ev.seq)) continue; seen.add(ev.seq); }
            if (conversationId !== convId) continue; // user switched away; keep draining
            if (ev.type === 'user') {
              if (skipUser) { skipUser = false; continue; }
              addUser(ev.text || ''); continue;
            }
            if (ev.type === 'usage') { renderUsage(ev); continue; }
            if (!out) out = addStreamingAssistant();
            handleEvent(ev, out);
          }
        }
      } catch (e) {
        if (out) { out.body.style.display = ''; out.body.classList.add('err'); out.body.textContent = 'Error: ' + e.message; }
      } finally {
        if (conversationId === convId) { streaming = false; setStreamingUI(false); }
        loadConversations();
      }
      return true;
    }

    function setStreamingUI(on) {
      const btn = $('send');
      btn.textContent = on ? '■' : '↑';
      btn.title = on ? 'Stop' : 'Send (Enter)';
      btn.classList.toggle('stop', on);
    }
    // Stop is an explicit endpoint now (disconnecting no longer kills the turn).
    function stopStreaming() {
      if (conversationId) api('/api/chat/' + conversationId + '/stop', { method: 'POST' });
    }

    /* ---------- usage display ---------- */
    function fmtTokens(n) { return n >= 1000 ? (n / 1000).toFixed(1) + 'k' : String(n); }
    function renderUsage(u) {
      const el = $('usage-info');
      if (!u || !u.total_tokens) { el.textContent = ''; return; }
      let s = fmtTokens(u.total_tokens) + ' tok';
      if (u.cost != null) s += ' · $' + Number(u.cost).toFixed(4);
      el.textContent = s;
      el.title = 'prompt ' + (u.prompt_tokens || 0) + ' · completion ' + (u.completion_tokens || 0);
    }
    async function refreshUsage(convId) {
      try { renderUsage(await (await api('/api/conversations/' + convId + '/usage')).json()); }
      catch (e) { renderUsage(null); }
    }

    function handleEvent(ev, out) {
      switch (ev.type) {
        case 'text':
          out.body.style.display = ''; out.raw += ev.text;
          out.body.innerHTML = renderMarkdown(out.raw); break;
        case 'reasoning':
          out.reasoning.style.display = ''; out.reasoningBody.textContent += ev.text; break;
        case 'tool_input':
          out.tools.appendChild(toolChip('▸ ', ev.title, ev.subtitle)); break;
        case 'tool_call_start':
          // args expandable; skip the placeholder empty-object payload
          out.tools.appendChild(toolChip('⚙ ', ev.name, ev.arguments && ev.arguments !== '{}' ? ev.arguments : null)); break;
        case 'tool_call_end':
          out.tools.appendChild(toolChip('✓ ', ev.name, ev.output || null)); break;
        case 'tool_output':
          break; // superseded by tool_call_end
        case 'retry':
          out.tools.appendChild(toolChip('↻ ', ev.cause, null)); break;
        case 'interrupt':
          out.body.style.display = ''; out.body.classList.add('err');
          out.body.innerHTML += '<p class="err">[interrupted: ' + escapeHtml(ev.reason) + ']</p>'; break;
        case 'error':
          out.body.style.display = ''; out.body.classList.add('err');
          out.body.innerHTML += '<p class="err">[error: ' + escapeHtml(ev.message) + ']</p>'; break;
        case 'complete': break;
      }
      (out.scroll || scrollDown)();
    }

    /* ---------- image attachments ---------- */
    function renderAttachPreview() {
      const box = $('attach-preview'); box.innerHTML = '';
      pendingImages.forEach((im, i) => {
        const t = document.createElement('div'); t.className = 'thumb';
        const img = document.createElement('img'); img.src = 'data:' + im.mime + ';base64,' + im.base64;
        const rm = document.createElement('button'); rm.className = 'rm'; rm.textContent = '×';
        rm.onclick = () => { pendingImages.splice(i, 1); renderAttachPreview(); };
        t.append(img, rm); box.appendChild(t);
      });
      // Warn when the active model can't see images.
      const model = $('model').value;
      if (pendingImages.length && model && modelSupportsImage[model] === false) {
        const w = document.createElement('div'); w.className = 'gh-fail';
        w.style.alignSelf = 'center';
        w.textContent = '⚠ ' + model + ' 不支持图片输入 — 模型将看不到这张图。请切换支持视觉的模型。';
        box.appendChild(w);
      }
    }
    function clearAttachments() { pendingImages = []; renderAttachPreview(); }
    function addImageFile(file) {
      if (!file || !file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = () => { pendingImages.push({ base64: reader.result.split(',')[1], mime: file.type, name: file.name || 'image' }); renderAttachPreview(); };
      reader.readAsDataURL(file);
    }
    $('attach').onclick = () => $('file-input').click();
    $('file-input').onchange = (e) => { for (const f of e.target.files) addImageFile(f); e.target.value = ''; };
    inputEl.addEventListener('paste', (e) => {
      for (const item of (e.clipboardData || {}).items || []) {
        if (item.type.startsWith('image/')) { addImageFile(item.getAsFile()); e.preventDefault(); }
      }
    });

    /* ---------- responsive sidebar ---------- */
    $('hamburger').onclick = () => document.body.classList.toggle('sidebar-open');

    /* ---------- export conversation ---------- */
    $('export-conv').onclick = async () => {
      if (!conversationId) { await confirmModal({ title: 'No conversation', body: 'Open or start a conversation first.', confirmText: 'OK', hideCancel: true, danger: false }); return; }
      const res = await api('/api/conversations/' + conversationId + '/export');
      if (!res.ok) { await confirmModal({ title: 'Export failed', body: 'Could not export.', confirmText: 'OK', hideCancel: true, danger: false }); return; }
      const html = await res.text();
      const url = URL.createObjectURL(new Blob([html], { type: 'text/html' }));
      const a = document.createElement('a'); a.href = url; a.download = 'forge-' + conversationId.slice(0, 8) + '.html';
      a.click(); URL.revokeObjectURL(url);
    };

    /* ---------- slash command / skill palette ---------- */
    let allCommands = [], allSkills = [], paletteItems = [], paletteSel = 0;
    async function loadCommandsSkills() {
      try { allCommands = await (await api('/api/commands')).json(); } catch (e) { allCommands = []; }
      try { allSkills = await (await api('/api/skills')).json(); } catch (e) { allSkills = []; }
    }
    function updatePalette() {
      const pal = $('cmd-palette');
      const m = inputEl.value.match(/^\/(\S*)$/);
      if (!m) { pal.classList.remove('open'); return; }
      const q = m[1].toLowerCase();
      const cmds = allCommands.filter((c) => c.name.toLowerCase().includes(q)).slice(0, 8);
      const sks = allSkills.filter((s) => s.name.toLowerCase().includes(q)).slice(0, 6);
      paletteItems = []; paletteSel = 0; pal.innerHTML = '';
      const section = (title, arr, kind) => {
        if (!arr.length) return;
        const h = document.createElement('div'); h.className = 'cmd-sec'; h.textContent = title; pal.appendChild(h);
        for (const x of arr) {
          const idx = paletteItems.length; paletteItems.push({ kind, data: x });
          const it = document.createElement('div'); it.className = 'cmd-item'; it.dataset.i = idx;
          const k = document.createElement('span'); k.className = 'k'; k.textContent = (kind === 'cmd' ? '/' : '📚 ') + x.name;
          const d = document.createElement('span'); d.className = 'd'; d.textContent = x.description || '';
          it.append(k, d);
          it.onmousedown = (e) => { e.preventDefault(); palettePick(idx); };
          it.onmouseenter = () => { paletteSel = idx; paintPalette(); };
          pal.appendChild(it);
        }
      };
      section('Commands', cmds, 'cmd');
      section('Skills', sks, 'skill');
      if (!paletteItems.length) { pal.classList.remove('open'); return; }
      pal.classList.add('open'); paintPalette();
    }
    function paintPalette() {
      $('cmd-palette').querySelectorAll('.cmd-item').forEach((el) => el.classList.toggle('sel', +el.dataset.i === paletteSel));
    }
    function paletteMove(d) {
      if (!paletteItems.length) return;
      paletteSel = (paletteSel + d + paletteItems.length) % paletteItems.length; paintPalette();
      const el = $('cmd-palette').querySelector('.cmd-item.sel'); if (el) el.scrollIntoView({ block: 'nearest' });
    }
    function palettePick(idx) {
      const item = paletteItems[idx != null ? idx : paletteSel]; if (!item) return;
      if (item.kind === 'cmd') inputEl.value = item.data.prompt || ('/' + item.data.name + ' ');
      else inputEl.value = 'Use the ' + item.data.name + ' skill to ';
      $('cmd-palette').classList.remove('open'); inputEl.focus(); autoGrow();
    }

    /* ---------- composer ---------- */
    function autoGrow() { inputEl.style.height = 'auto'; inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px'; }
    inputEl.addEventListener('input', () => { autoGrow(); updatePalette(); });
    $('send').onclick = () => (streaming ? stopStreaming() : send());
    $('new').onclick = newConversation;
    inputEl.addEventListener('keydown', (e) => {
      // Slash palette navigation takes priority when it's open.
      if ($('cmd-palette').classList.contains('open')) {
        if (e.key === 'ArrowDown') { e.preventDefault(); paletteMove(1); return; }
        if (e.key === 'ArrowUp') { e.preventDefault(); paletteMove(-1); return; }
        if (e.key === 'Escape') { $('cmd-palette').classList.remove('open'); return; }
        if ((e.key === 'Enter' || e.key === 'Tab') && !e.isComposing) { e.preventDefault(); palettePick(); return; }
      }
      // Ignore Enter while an IME is composing (e.g. selecting a pinyin
      // candidate) — `isComposing`/keyCode 229 mark an in-progress composition.
      if (e.key === 'Enter' && !e.shiftKey && !e.isComposing && e.keyCode !== 229) {
        e.preventDefault();
        send();
      }
    });

    // Delegated copy handler: assistant bubbles rebuild their innerHTML while
    // streaming, so a per-button listener wouldn't survive — listen on the
    // persistent container instead.
    messagesEl.addEventListener('click', async (e) => {
      const btn = e.target.closest('.copy-btn');
      if (!btn) return;
      const code = btn.parentElement.querySelector('pre code');
      if (!code) return;
      const text = code.textContent;
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
        } else {
          const ta = document.createElement('textarea');
          ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
          document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
        }
        btn.textContent = 'Copied'; btn.classList.add('copied');
      } catch (err) {
        btn.textContent = 'Failed';
      }
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1400);
    });

    /* ---------- connections drawer (providers + MCP) ---------- */
    function openSettings() { $('drawer-overlay').classList.add('open'); loadMcp(); loadProviders(); }
    function closeSettings() { $('drawer-overlay').classList.remove('open'); }
    $('settings').onclick = openSettings;
    $('drawer-close').onclick = closeSettings;
    $('drawer-overlay').addEventListener('mousedown', (e) => { if (e.target === $('drawer-overlay')) closeSettings(); });

    function connRow({ name, sub, badge, actions }) {

      const info = document.createElement('div'); info.className = 'info';

      for (const a of actions) {

        btn.textContent = a.label; btn.onclick = a.onClick; act.appendChild(btn);

    // Built-in integrations. These MCP endpoints don't support OAuth dynamic

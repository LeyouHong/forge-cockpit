# Real-world example: GitLab REST API v4 with a bearer PAT. Adding a platform
# like this is just writing a manifest — no Rust code changes.
id: gitlab
name: GitLab
protocol: http
base_url: "{host}"
description: GitLab REST API v4 (authenticated with a personal access token).
auth:
  type: bearer
  token: "{token}"
config:
  - id: host
    label: API base URL
    placeholder: https://gitlab.com/api/v4
    required: true
  - id: token
    label: Personal access token
    secret: true
    required: true
tools:
  - name: list_my_issues
    description: Open issues assigned to me.
    method: GET
    path: /issues
    query:
      scope: assigned_to_me
      state: opened
  - name: get_project
    description: Get a project by numeric id or URL-encoded path.
    method: GET
    path: /projects/{project}
    params:
      - id: project
        required: true
        description: Numeric id, or URL-encoded "group/project".

# Jira Cloud via Atlassian OAuth 2.0 (3LO), authorization code flow.
# Register an OAuth 2.0 (3LO) app at developer.atlassian.com with a callback of
# http://localhost/oauth/callback and the Jira scopes below; it's a confidential
# client, so paste the client secret too. `cloudid` comes from
# https://api.atlassian.com/oauth/token/accessible-resources after connecting.
id: jira
name: Jira
protocol: http
base_url: https://api.atlassian.com/ex/jira/{cloudid}/rest/api/3
description: Jira Cloud REST API via Atlassian OAuth 2.0 (3LO, authorization code).
auth:
  type: oauth
  flow: code
  client_id: "{client_id}"
  client_secret: "{client_secret}"
  authorize_url: https://auth.atlassian.com/authorize
  token_url: https://auth.atlassian.com/oauth/token
  authorize_params:
    audience: api.atlassian.com
    prompt: consent
  scopes: [read:jira-work, read:jira-user, write:jira-work, offline_access]
  use: bearer
headers:
  Accept: application/json
config:
  - id: client_id
    label: OAuth 2.0 (3LO) client id
    required: true
  - id: client_secret
    label: Client secret
    secret: true
    required: true
  - id: cloudid
    label: Cloud ID
    placeholder: from /oauth/token/accessible-resources
    required: true
tools:
  - name: my_open_issues
    description: Unresolved issues assigned to me, most recently updated first.
    method: GET
    path: /search/jql
    query:
      jql: assignee = currentUser() AND resolution = Unresolved ORDER BY updated DESC
      maxResults: "25"
  - name: search
    description: Search issues with a JQL query.
    method: GET
    path: /search/jql
    query:
      jql: "{jql}"
      maxResults: "25"
    params:
      - id: jql
        required: true
  - name: get_issue
    description: Fetch one issue by key.
    method: GET
    path: /issue/{key}
    params:
      - id: key
        required: true
  - name: list_projects
    description: Projects visible to you.
    method: GET
    path: /project/search
    query:
      maxResults: "50"
  # --- write tools (need the write:jira-work scope above) ---
  - name: add_comment
    description: Add a comment to an issue.
    method: POST
    path: /issue/{key}/comment
    body:
      body:
        type: doc
        version: 1
        content:
          - type: paragraph
            content:
              - type: text
                text: "{text}"
    params:
      - id: key
        required: true
      - id: text
        required: true
  - name: transition_issue
    description: Move an issue to another status by transition id (see get_issue transitions).
    method: POST
    path: /issue/{key}/transitions
    body:
      transition:
        id: "{transition_id}"
    params:
      - id: key
        required: true
      - id: transition_id
        required: true
  - name: create_issue
    description: Create an issue in a project.
    method: POST
    path: /issue
    body:
      fields:
        project:
          key: "{project}"
        issuetype:
          name: "{issuetype}"
        summary: "{summary}"
    params:
      - id: project
        required: true
        description: Project key, e.g. ABC
      - id: issuetype
        required: true
        description: e.g. Task, Bug
      - id: summary
        required: true

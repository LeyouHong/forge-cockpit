# Sentry via OAuth (authorization code). Create an OAuth application at
# sentry.io/settings/account/api/applications with a redirect of
# http://localhost/oauth/callback; it's a confidential client, so paste the
# client secret too. `org` is your organization slug.
id: sentry
name: Sentry
protocol: http
base_url: https://sentry.io/api/0
description: Sentry API via OAuth — projects and unresolved issues for an org.
auth:
  type: oauth
  flow: code
  client_id: "{client_id}"
  client_secret: "{client_secret}"
  authorize_url: https://sentry.io/oauth/authorize/
  token_url: https://sentry.io/oauth/token/
  scopes: [org:read, project:read, event:read]
  use: bearer
headers:
  Accept: application/json
config:
  - id: client_id
    label: OAuth application client id
    required: true
  - id: client_secret
    label: Client secret
    secret: true
    required: true
  - id: org
    label: Organization slug
    placeholder: your-org
    required: true
tools:
  - name: list_projects
    description: Projects in the organization.
    method: GET
    path: /organizations/{org}/projects/
  - name: list_issues
    description: Unresolved issues in the organization (last 24h).
    method: GET
    path: /organizations/{org}/issues/
    query:
      query: is:unresolved
      statsPeriod: 24h
  - name: get_issue
    description: Fetch one issue by its numeric id.
    method: GET
    path: /issues/{issue_id}/
    params:
      - id: issue_id
        required: true

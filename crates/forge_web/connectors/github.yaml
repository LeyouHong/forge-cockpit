# GitHub REST API v3 via OAuth (device flow) — just click Connect, authorize in
# your browser, done. The client_id below is a public GitHub OAuth App id (with
# device flow enabled); device flow needs no client secret.
id: github
name: GitHub
protocol: http
base_url: https://api.github.com
description: GitHub REST API — issues, pull requests, repos, search (OAuth device flow).
auth:
  type: oauth
  flow: device
  client_id: Ov23lixdjD0dd78rPnN2
  device_authorize_url: https://github.com/login/device/code
  token_url: https://github.com/login/oauth/access_token
  scopes: [repo, read:org]
  use: bearer
headers:
  Accept: application/vnd.github+json
  X-GitHub-Api-Version: "2022-11-28"
tools:
  - name: list_my_issues
    description: Open issues assigned to the authenticated user across all repos.
    method: GET
    path: /issues
    query:
      filter: assigned
      state: open
  - name: list_repo_issues
    description: Open issues in a repository.
    method: GET
    path: /repos/{owner}/{repo}/issues
    query:
      state: open
    params:
      - id: owner
        required: true
      - id: repo
        required: true
  - name: list_repo_pulls
    description: Open pull requests in a repository.
    method: GET
    path: /repos/{owner}/{repo}/pulls
    query:
      state: open
    params:
      - id: owner
        required: true
      - id: repo
        required: true
  - name: get_repo
    description: Repository metadata (stars, default branch, etc.).
    method: GET
    path: /repos/{owner}/{repo}
    params:
      - id: owner
        required: true
      - id: repo
        required: true
  - name: search_issues
    description: Search issues and pull requests with GitHub's query syntax.
    method: GET
    path: /search/issues
    query:
      q: "{q}"
    params:
      - id: q
        required: true
        description: 'e.g. "repo:owner/name is:open is:pr review-requested:@me"'
  # --- write tools (the `repo` scope above already grants write) ---
  - name: create_issue
    description: Open a new issue in a repository.
    method: POST
    path: /repos/{owner}/{repo}/issues
    body:
      title: "{title}"
      body: "{body}"
    params:
      - id: owner
        required: true
      - id: repo
        required: true
      - id: title
        required: true
      - id: body
        required: false
  - name: comment_issue
    description: Add a comment to an issue or pull request.
    method: POST
    path: /repos/{owner}/{repo}/issues/{number}/comments
    body:
      body: "{body}"
    params:
      - id: owner
        required: true
      - id: repo
        required: true
      - id: number
        required: true
      - id: body
        required: true
  - name: close_issue
    description: Close an issue.
    method: PATCH
    path: /repos/{owner}/{repo}/issues/{number}
    body:
      state: closed
    params:
      - id: owner
        required: true
      - id: repo
        required: true
      - id: number
        required: true

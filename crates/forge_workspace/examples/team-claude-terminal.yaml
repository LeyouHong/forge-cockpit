# A resident-terminal team: workers are persistent tmux sessions running
# interactive Claude Code on the user's subscription login — no provider API
# key is spent on the inner loop. The orchestrator injects prompts into each
# pane and watches the board; join any member live with
# `tmux attach -t forge-team-<id>`.
#
# Planning stays on forge subprocess members (cheap, short, structured); the
# long-running implement/review work rides the subscription.
#
# Requires: tmux installed, `claude` installed and logged in. The default
# terminal command is `claude --dangerously-skip-permissions` (unattended
# operation); set `terminal_cmd: "claude"` to keep permission prompts on, or
# point terminal_cmd at another CLI agent entirely.
#
# Import from the Team page (team YAML import), or save as
# <project>/.forge-workspace/.team.json in JSON form.
members:
  - id: coordinator
    name: Lead
    icon: 🧭
    stage: plan
    agent: ""
    role_prompt: ""
    depends_on: []
    requires_approval: false
  - id: engineer
    name: Engineer
    icon: 🔨
    stage: implement
    agent: ""
    role_prompt: ""
    depends_on:
      - coordinator
    requires_approval: false
    terminal: true
    terminal_cmd: ""
  - id: reviewer
    name: Reviewer
    icon: 🔍
    stage: review
    agent: ""
    role_prompt: ""
    depends_on:
      - engineer
    requires_approval: false
    terminal: true
    terminal_cmd: ""
  - id: qa
    name: QA
    icon: ✅
    stage: qa
    agent: ""
    role_prompt: ""
    depends_on:
      - reviewer
    requires_approval: false
    terminal: true
    terminal_cmd: ""

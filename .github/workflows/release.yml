name: release

# Single-package distribution. On a `release-v*` tag:
#   1. build the `forge` binary for each platform (native runners, no cross)
#   2. attach the binaries to a GitHub Release
#   3. publish ONE npm package (`forge-cockpit`) whose postinstall downloads the
#      matching binary from that release.
#
# The `release-v*` prefix avoids the many upstream `v*` tags this fork inherited.
# Requires repo secret NPM_TOKEN (an npm automation token with publish rights).

on:
  push:
    tags:
      - "release-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (without leading v), e.g. 0.1.2"
        required: true

permissions:
  contents: write # needed to create the GitHub Release

jobs:
  build:
    name: build ${{ matrix.pkg }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,         target: aarch64-apple-darwin,      pkg: darwin-arm64, npm_os: darwin, npm_cpu: arm64 }
          # macos-13 is the last Intel runner. Without this row there is no
          # darwin-x64 asset, and Intel Mac users get an install that "succeeds"
          # and a CLI that can never run.
          - { os: macos-13,         target: x86_64-apple-darwin,       pkg: darwin-x64,   npm_os: darwin, npm_cpu: x64 }
          # Linux runners are pinned to ubuntu-22.04 (glibc 2.35) so the
          # binaries run on Ubuntu 22.04 LTS and anything newer; ubuntu-latest
          # (24.04, glibc 2.39) yields binaries that fail there (issue #10).
          - { os: ubuntu-22.04,     target: x86_64-unknown-linux-gnu,  pkg: linux-x64,    npm_os: linux,  npm_cpu: x64 }
          - { os: ubuntu-22.04-arm, target: aarch64-unknown-linux-gnu, pkg: linux-arm64,  npm_os: linux,  npm_cpu: arm64 }
          - { os: windows-latest,   target: x86_64-pc-windows-msvc,    pkg: win32-x64,    npm_os: win32,  npm_cpu: x64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install OpenSSL (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      # forge_repo's build script (prost-build) needs the protobuf compiler.
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # aws-lc-sys (via the AWS Bedrock provider) needs nasm on Windows.
      - name: Install nasm (windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#release-v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release binary
        env:
          APP_VERSION: ${{ steps.ver.outputs.version }}
        run: cargo build --release -p forge_main --target ${{ matrix.target }}

      - name: Stage binary as a release asset
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.npm_os }}" = "win32" ]; then
            cp "target/${{ matrix.target }}/release/forge.exe" "dist/forge-cockpit-${{ matrix.pkg }}.exe"
          else
            cp "target/${{ matrix.target }}/release/forge" "dist/forge-cockpit-${{ matrix.pkg }}"
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.pkg }}
          path: dist/*

  release:
    name: release + publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          path: dist
          merge-multiple: true

      - name: Resolve version + tag
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF_NAME#release-v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=release-v$V" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release with binaries
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* \
              --title "forge-cockpit ${{ steps.ver.outputs.version }}" \
              --notes "Prebuilt binaries for \`forge-cockpit\`. Install with \`npm i -g forge-cockpit\`."
          fi

      - name: Publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VER: ${{ steps.ver.outputs.version }}
        run: |
          node -e '
            const fs = require("fs"), p = "npm/forge-cockpit/package.json";
            const j = JSON.parse(fs.readFileSync(p, "utf8"));
            j.version = process.env.VER;
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + "\n");
          '
          npm publish ./npm/forge-cockpit --access public

# Continuous integration for LeyouHong/forge-cockpit.
#
# Slimmed from the upstream multi-job pipeline down to build + test only. The
# release / cross-target / eval / telemetry jobs were removed because they need
# secrets this fork doesn't have (NPM_TOKEN, HOMEBREW_ACCESS, POSTHOG_API_SECRET,
# OPENROUTER_API_KEY) and publish to upstream-owned registries. This job uses
# only the auto-provided GITHUB_TOKEN, so it runs with no extra setup.

name: ci
env:
  RUSTFLAGS: '-Dwarnings'
'on':
  pull_request:
    types:
    - opened
    - synchronize
    - reopened
    branches:
    - main
  push:
    branches:
    - main
jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
    - name: Setup Protobuf Compiler
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Setup Rust Toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
    - name: Build
      run: cargo build --workspace --all-features
    - name: Test
      run: cargo test --workspace --all-features

  # The npm wrapper is what users actually install, and nothing used to check it
  # — every distribution bug so far (glibc floor, missing Intel Mac binary)
  # shipped through a green CI. This job is cheap and runs on every PR.
  npm-package:
    name: npm package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: Syntax-check the install scripts
      run: |
        for f in npm/forge-cockpit/platforms.js \
                 npm/forge-cockpit/postinstall.js \
                 npm/forge-cockpit/bin/forge-cockpit.js; do
          node --check "$f"
        done
    - name: Platform table matches the release matrix, and nothing is left out of the tarball
      run: node npm/forge-cockpit/check-consistency.mjs
    - name: Every file required at runtime is in the packed tarball
      working-directory: npm/forge-cockpit
      run: |
        set -e
        npm pack --silent >/dev/null
        tar tzf forge-cockpit-*.tgz | sed 's|^package/||' | sort > /tmp/packed
        echo "packed:"; cat /tmp/packed
        for f in platforms.js postinstall.js bin/forge-cockpit.js; do
          grep -qx "$f" /tmp/packed || { echo "::error::$f is missing from the npm tarball"; exit 1; }
        done

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

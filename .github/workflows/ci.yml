# Continuous integration for LeyouHong/forgecode.
#
# Slimmed from the upstream multi-job pipeline down to build + test only. The
# release / cross-target / eval / telemetry jobs were removed because they need
# secrets this fork doesn't have (NPM_TOKEN, HOMEBREW_ACCESS, POSTHOG_API_SECRET,
# OPENROUTER_API_KEY) and publish to upstream-owned registries. This job uses
# only the auto-provided GITHUB_TOKEN, so it runs with no extra setup.

name: ci
env:
  RUSTFLAGS: '-Dwarnings'
'on':
  pull_request:
    types:
    - opened
    - synchronize
    - reopened
    branches:
    - main
  push:
    branches:
    - main
jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
    - name: Setup Protobuf Compiler
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Setup Rust Toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
    - name: Build
      run: cargo build --workspace --all-features
    - name: Test
      run: cargo test --workspace --all-features
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
